name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - claude/*

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Build
        run: npm run build

      - name: Download HSP artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: hsp-*
          path: dist/hsp/
          merge-multiple: false
        continue-on-error: true

      - name: Flatten HSP artifact directories
        run: |
          if [ -d "dist/hsp" ]; then
            cd dist/hsp
            for dir in hsp-*/; do
              experiment="${dir#hsp-}"
              experiment="${experiment%/}"
              if [ -d "$dir" ] && [ -n "$experiment" ]; then
                mv "$dir" "$experiment" 2>/dev/null || true
              fi
            done
          fi

      - name: Upload artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
