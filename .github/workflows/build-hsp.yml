name: Build HSP experiments

on:
  push:
    paths:
      - 'hsp/**'
      - '.github/workflows/build-hsp.yml'
  pull_request:
    paths:
      - 'hsp/**'
  workflow_dispatch:

env:
  # OpenHSP v3.7 release (contains hspcmp.exe, common/, hsp3dish.js runtime)
  HSP_RELEASE_URL: https://github.com/onitama/OpenHSP/releases/download/v3.7/hsp37en.zip
  # Emscripten version. OpenHSP v3.7 の makefile.emscripten は LINK_FLAGS で
  # FS_createPath / FS_createPreloadedFile しか export していない。
  # file_packager は Module.FS_createDataFile も呼ぶので makefile を sed パッチして補う。
  EM_VERSION: '3.1.74'
  EM_CACHE_FOLDER: 'emsdk-cache'
  # 3rd party JS actions（setup-emsdk 等）を Node 24 で動かして deprecation 警告を消す
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # ---------------------------------------------------------------
  # Step 1: Build hsp3dish.js runtime from OpenHSP source
  # The release ZIP is a Windows GUI distribution and may not include
  # the Emscripten-built hsp3dish.js + .wasm. We build from source.
  # ---------------------------------------------------------------
  build-runtime:
    runs-on: ubuntu-latest
    steps:
      - name: Cache runtime artifacts
        id: cache-runtime
        uses: actions/cache@v5
        with:
          path: runtime-out
          key: hsp3dish-runtime-v3.7-em${{ env.EM_VERSION }}-patched-fs3

      - name: Checkout OpenHSP
        if: steps.cache-runtime.outputs.cache-hit != 'true'
        uses: actions/checkout@v5
        with:
          repository: onitama/OpenHSP
          ref: v3.7
          path: OpenHSP

      - name: Patch makefile.emscripten to export FS_createDataFile/Device
        if: steps.cache-runtime.outputs.cache-hit != 'true'
        working-directory: OpenHSP
        run: |
          # 元の LINK_FLAGS_CORE には FS_createPath / FS_createPreloadedFile しか
          # export されていない。file_packager 出力が Module.FS_createDataFile を
          # 呼ぶので追加する。
          sed -i "s/'FS_createPreloadedFile', 'FS_createPath'/'FS_createPreloadedFile', 'FS_createPath', 'FS_createDataFile', 'FS_createDevice'/g" makefile.emscripten
          echo "=== Patched LINK_FLAGS_CORE ==="
          grep -A1 "LINK_FLAGS_CORE =" makefile.emscripten | head -5

      - name: Setup Emscripten
        if: steps.cache-runtime.outputs.cache-hit != 'true'
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: ${{ env.EM_VERSION }}
          actions-cache-folder: ${{ env.EM_CACHE_FOLDER }}

      - name: Build hsp3dish.js
        if: steps.cache-runtime.outputs.cache-hit != 'true'
        working-directory: OpenHSP
        run: make -f makefile.emscripten -j$(nproc)

      - name: Patch hsp3dish.js to bind FS_createDataFile to local fn
        if: steps.cache-runtime.outputs.cache-hit != 'true'
        working-directory: OpenHSP
        run: |
          # Emscripten 3.1.74 では FS.createDataFile プロパティが存在せず
          # Module["FS_createDataFile"]=FS.createDataFile が undefined を代入する。
          # ローカル関数 FS_createDataFile はあるのでそれを使うように直す。
          # 同じ理由で createDevice/createPath も念のため差し替える。
          before=$(grep -c "Module\[\"FS_createDataFile\"\]=FS\.createDataFile" hsp3dish.js || true)
          echo "Before patch: FS.createDataFile occurrences = $before"
          sed -i 's/Module\["FS_createDataFile"\]=FS\.createDataFile/Module["FS_createDataFile"]=FS_createDataFile/g' hsp3dish.js
          sed -i 's/Module\["FS_createDevice"\]=FS\.createDevice/Module["FS_createDevice"]=FS_createDevice/g' hsp3dish.js
          after_data=$(grep -c "Module\[\"FS_createDataFile\"\]=FS_createDataFile" hsp3dish.js || true)
          after_dev=$(grep -c "Module\[\"FS_createDevice\"\]=FS_createDevice" hsp3dish.js || true)
          echo "After: FS_createDataFile bind = $after_data, FS_createDevice bind = $after_dev"
          if [ "$after_data" -eq 0 ]; then
            echo "ERROR: patch did not apply to FS_createDataFile"; exit 1
          fi

      - name: Collect runtime files
        if: steps.cache-runtime.outputs.cache-hit != 'true'
        run: |
          mkdir -p runtime-out
          cp OpenHSP/hsp3dish.js runtime-out/
          cp OpenHSP/hsp3dish.wasm runtime-out/
          ls -la runtime-out/

      - name: Upload runtime
        uses: actions/upload-artifact@v5
        with:
          name: hsp3dish-runtime
          path: runtime-out/

  # ---------------------------------------------------------------
  # Step 2: Compile each HSP experiment
  # Uses Windows runner for hspcmp.exe (native Win32 compiler).
  # Then uses Emscripten file_packager to create .data bundles.
  # ---------------------------------------------------------------
  build:
    needs: build-runtime
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        experiment:
          - chinchirorin
          - claw-machine
          - slot-machine
          - janken
          - rain-walk
          - survivor-bias
          - ancestor-probability

    steps:
      - uses: actions/checkout@v5

      - name: Download hsp3dish.js runtime
        uses: actions/download-artifact@v5
        with:
          name: hsp3dish-runtime
          path: runtime

      # --- Get HSP compiler (hspcmp.exe) from release ---
      - name: Cache HSP release
        id: cache-hsp
        uses: actions/cache@v5
        with:
          path: hsp3
          key: hsp37en-release-v3.7

      - name: Download and extract HSP3.7 release
        if: steps.cache-hsp.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          Write-Host "Downloading OpenHSP v3.7 release..."
          Invoke-WebRequest -Uri "$env:HSP_RELEASE_URL" -OutFile hsp37en.zip
          Write-Host "Extracting..."
          Expand-Archive -Path hsp37en.zip -DestinationPath hsp3-extract -Force
          # The ZIP may extract to a subdirectory; find hspcmp.exe
          $hspcmp = Get-ChildItem -Path hsp3-extract -Recurse -Filter "hspcmp.exe" | Select-Object -First 1
          if (-not $hspcmp) {
            Write-Error "hspcmp.exe not found in release ZIP!"
            # Fallback: build from source in next step
            exit 1
          }
          $hspRoot = $hspcmp.Directory.FullName
          Write-Host "Found HSP root at: $hspRoot"

          # Copy necessary files to hsp3/
          New-Item -ItemType Directory -Force -Path hsp3
          Copy-Item "$hspRoot/hspcmp.exe" "hsp3/"
          # Copy common/ directory (contains hspdef.as and other standard includes)
          if (Test-Path "$hspRoot/common") {
            Copy-Item -Recurse "$hspRoot/common" "hsp3/common"
          } elseif (Test-Path "$hspRoot/../common") {
            Copy-Item -Recurse "$hspRoot/../common" "hsp3/common"
          }

          # Also look for hsp3dish runtime in the release (backup plan)
          $dishJs = Get-ChildItem -Path hsp3-extract -Recurse -Filter "hsp3dish.js" | Select-Object -First 1
          if ($dishJs) {
            Copy-Item $dishJs.FullName "hsp3/"
            $dishWasm = Get-ChildItem -Path $dishJs.Directory -Filter "hsp3dish.wasm" | Select-Object -First 1
            if ($dishWasm) { Copy-Item $dishWasm.FullName "hsp3/" }
          }

          # Cleanup
          Remove-Item -Recurse hsp3-extract -ErrorAction SilentlyContinue
          Remove-Item hsp37en.zip -ErrorAction SilentlyContinue

          Write-Host "HSP3 directory contents:"
          Get-ChildItem hsp3/ | Format-Table Name, Length

      # --- Setup Python (needed for file_packager.py) ---
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # --- Setup Emscripten (needed for file_packager.py) ---
      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: ${{ env.EM_VERSION }}
          actions-cache-folder: ${{ env.EM_CACHE_FOLDER }}

      # --- Compile .hsp -> .ax and bundle ---
      - name: Compile ${{ matrix.experiment }}
        shell: pwsh
        run: |
          $exp = "${{ matrix.experiment }}"
          $srcDir = "hsp/$exp"
          $outDir = "public/hsp/$exp"

          New-Item -ItemType Directory -Force -Path $outDir

          if (-not (Test-Path "$srcDir/main.hsp")) {
            Write-Host "::warning::No main.hsp found for $exp, skipping"
            exit 0
          }

          Write-Host "=== Compiling $exp ==="

          # -------------------------------------------
          # 1. Compile main.hsp -> start.ax using hspcmp.exe
          # -------------------------------------------
          # hspcmp options:
          #   -ostart.ax  : output filename
          #   -d          : include debug info (remove for release)
          #   -i          : input is UTF-8
          #   -u          : output UTF-8 strings
          #   --compath=  : path to common/ includes
          $commonPath = (Resolve-Path "hsp3/common/").Path
          # Ensure trailing backslash for Windows
          if (-not $commonPath.EndsWith("\")) { $commonPath += "\" }

          # Use absolute paths to avoid Push-Location issues with child processes
          $hspcmpPath = (Resolve-Path "hsp3/hspcmp.exe").Path
          $srcFullPath = (Resolve-Path $srcDir).Path
          $mainHsp = Join-Path $srcFullPath "main.hsp"
          $axOutput = Join-Path $srcFullPath "start.ax"

          # Run hspcmp with absolute paths for both input and output
          Write-Host "Running: $hspcmpPath -o$axOutput -i -u -m --compath=$commonPath $mainHsp"
          & $hspcmpPath "-o$axOutput" -i -u -m "--compath=$commonPath" $mainHsp
          $compileResult = $LASTEXITCODE

          if ($compileResult -ne 0) {
            Write-Error "Compilation failed for $exp (exit code: $compileResult)"
            exit 1
          }

          # Search for the .ax file (hspcmp may use different output names/locations)
          $axFound = $null
          $searchNames = @("start.ax", "main.ax")
          $searchDirs = @($srcFullPath, (Get-Location).Path, (Resolve-Path "hsp3").Path)

          foreach ($dir in $searchDirs) {
            foreach ($name in $searchNames) {
              $candidate = Join-Path $dir $name
              if (Test-Path $candidate) {
                $axFound = $candidate
                break
              }
            }
            if ($axFound) { break }
          }

          # Last resort: recursive search
          if (-not $axFound) {
            Write-Host "Searching entire workspace for .ax files..."
            Get-ChildItem -Path "." -Recurse -Filter "*.ax" -ErrorAction SilentlyContinue | ForEach-Object {
              Write-Host "  Found: $($_.FullName) ($($_.Length) bytes)"
            }
            $axSearch = Get-ChildItem -Path "." -Recurse -Filter "start.ax" -ErrorAction SilentlyContinue | Select-Object -First 1
            if (-not $axSearch) {
              $axSearch = Get-ChildItem -Path "." -Recurse -Filter "main.ax" -ErrorAction SilentlyContinue | Select-Object -First 1
            }
            if ($axSearch) {
              $axFound = $axSearch.FullName
            }
          }

          if (-not $axFound) {
            Write-Error "start.ax was not generated for $exp"
            exit 1
          }

          # Ensure it's named start.ax in the srcDir (hsp3dish.js expects this name)
          $targetAx = Join-Path $srcFullPath "start.ax"
          if ($axFound -ne $targetAx) {
            Copy-Item $axFound $targetAx -Force
          }

          Write-Host "start.ax ready at: $targetAx ($($(Get-Item $targetAx).Length) bytes)"

          # -------------------------------------------
          # 2. Prepare data directory for file_packager
          # -------------------------------------------
          # Emscripten's file_packager bundles files into a .data file
          # that gets loaded into the virtual filesystem.
          # hsp3dish.js expects to find start.ax in the root of the VFS.
          $dataStage = "staging/$exp"
          New-Item -ItemType Directory -Force -Path $dataStage

          # Copy compiled bytecode
          Copy-Item "$srcDir/start.ax" "$dataStage/"

          # Copy resource files (images, sounds, etc.)
          if (Test-Path "$srcDir/res") {
            $resFiles = Get-ChildItem "$srcDir/res" -File
            foreach ($f in $resFiles) {
              Copy-Item $f.FullName "$dataStage/"
            }
          }

          # Copy common assets if the project has a hsp/common directory
          if (Test-Path "hsp/common") {
            $commonFiles = Get-ChildItem "hsp/common" -File
            foreach ($f in $commonFiles) {
              if (-not (Test-Path "$dataStage/$($f.Name)")) {
                Copy-Item $f.FullName "$dataStage/"
              }
            }
          }

          Write-Host "Data staging directory contents:"
          Get-ChildItem $dataStage | Format-Table Name, Length

          # -------------------------------------------
          # 3. Create .data bundle with file_packager.py
          # -------------------------------------------
          # file_packager.py creates two files:
          #   - <name>.data : the binary data bundle
          #   - <name>.js   : JS loader that registers files in Emscripten VFS
          #
          # The JS loader must be included BEFORE hsp3dish.js in the HTML.
          # Use EMSDK env var set by mymindstorm/setup-emsdk
          $emsdkRoot = $env:EMSDK
          $filePackager = "$emsdkRoot/upstream/emscripten/tools/file_packager.py"
          if (-not (Test-Path $filePackager)) {
            # Another common location
            $filePackager = (Get-Command "emcc" -ErrorAction SilentlyContinue).Source | Split-Path
            $filePackager = "$filePackager/tools/file_packager.py"
          }
          if (-not (Test-Path $filePackager)) {
            # Last resort: find it
            $fpFound = Get-ChildItem -Path $env:EMSDK -Recurse -Filter "file_packager.py" -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($fpFound) {
              $filePackager = $fpFound.FullName
            } else {
              Write-Error "Cannot find file_packager.py!"
              exit 1
            }
          }

          Write-Host "Using file_packager: $filePackager"

          # Run file_packager
          # --preload staging/exp@/ maps the staging dir contents to VFS root /
          python $filePackager `
            "$outDir/$exp.data" `
            --preload "$dataStage@/" `
            --js-output="$outDir/$exp.js" `
            --no-node

          if ($LASTEXITCODE -ne 0) {
            Write-Error "file_packager failed for $exp"
            exit 1
          }

          Write-Host "$exp.data created ($($(Get-Item "$outDir/$exp.data").Length) bytes)"

          # -------------------------------------------
          # 4. Copy hsp3dish.js runtime
          # -------------------------------------------
          # Prefer the Emscripten-built runtime from the build-runtime job
          if (Test-Path "runtime/hsp3dish.js") {
            Copy-Item "runtime/hsp3dish.js" "$outDir/"
            if (Test-Path "runtime/hsp3dish.wasm") {
              Copy-Item "runtime/hsp3dish.wasm" "$outDir/"
            }
          } elseif (Test-Path "hsp3/hsp3dish.js") {
            # Fallback: from the release ZIP
            Copy-Item "hsp3/hsp3dish.js" "$outDir/"
            if (Test-Path "hsp3/hsp3dish.wasm") {
              Copy-Item "hsp3/hsp3dish.wasm" "$outDir/"
            }
          } else {
            Write-Error "hsp3dish.js runtime not found!"
            exit 1
          }

          # -------------------------------------------
          # 5. Generate index.html from template
          # -------------------------------------------
          $template = Get-Content "hsp/template/index.html" -Raw

          # Read resolution from hsp source or use defaults
          # TODO: Parse hsp3dish.ini if it exists in the experiment dir
          $hspWx = "800"
          $hspWy = "600"
          $hspSx = "800"
          $hspSy = "600"
          $autoScale = "0"

          # Check for a config file that overrides defaults
          if (Test-Path "$srcDir/hsp3dish.ini") {
            $ini = Get-Content "$srcDir/hsp3dish.ini"
            foreach ($line in $ini) {
              if ($line -match "^wx=(\d+)") { $hspWx = $Matches[1] }
              if ($line -match "^wy=(\d+)") { $hspWy = $Matches[1] }
              if ($line -match "^sx=(\d+)") { $hspSx = $Matches[1] }
              if ($line -match "^sy=(\d+)") { $hspSy = $Matches[1] }
              if ($line -match "^autoscale=(\d+)") { $autoScale = $Matches[1] }
            }
          }

          # Pretty title from experiment name
          $title = ($exp -replace '-', ' ').ToUpper().Substring(0,1) + ($exp -replace '-', ' ').Substring(1)

          # build id (epoch seconds) for cache busting script src URLs
          $buildId = [int][double]::Parse((Get-Date -UFormat %s))

          $html = $template `
            -replace '{{TITLE}}', $title `
            -replace '{{EXPERIMENT}}', $exp `
            -replace '{{HSP_WX}}', $hspWx `
            -replace '{{HSP_WY}}', $hspWy `
            -replace '{{HSP_SX}}', $hspSx `
            -replace '{{HSP_SY}}', $hspSy `
            -replace '{{HSP_AUTOSCALE}}', $autoScale `
            -replace '{{BUILD_ID}}', $buildId

          $html | Set-Content "$outDir/index.html" -Encoding UTF8

          # -------------------------------------------
          # Summary
          # -------------------------------------------
          Write-Host ""
          Write-Host "=== Build complete for $exp ==="
          Write-Host "Output files:"
          Get-ChildItem $outDir | Format-Table Name, Length

      - name: Upload build artifacts
        uses: actions/upload-artifact@v5
        with:
          name: hsp-${{ matrix.experiment }}
          path: public/hsp/${{ matrix.experiment }}/
          if-no-files-found: warn

  # ---------------------------------------------------------------
  # Step 3: Commit built HSP artifacts back to main so CF Pages
  # (git integration) picks them up and deploys them.
  # ---------------------------------------------------------------
  commit:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v5
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: merged
          pattern: hsp-*
          merge-multiple: false

      - name: Place artifacts under public/hsp/
        run: |
          mkdir -p public/hsp
          for dir in merged/hsp-*/; do
            [ -d "$dir" ] || continue
            exp=$(basename "$dir" | sed 's/^hsp-//')
            # runtime artifact (hsp3dish-runtime) は exp ではないので除外
            if [ "$exp" = "3dish-runtime" ] || [ "$exp" = "all-experiments" ]; then
              continue
            fi
            rm -rf "public/hsp/$exp"
            cp -r "$dir" "public/hsp/$exp"
            echo "Placed: public/hsp/$exp"
          done
          echo "=== public/hsp/ tree ==="
          find public/hsp -type f | head -80

      - name: Commit & push HSP artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/hsp/
          if git diff --cached --quiet; then
            echo "No HSP changes to commit."
            exit 0
          fi
          # CF Pages git 連携は [skip ci] / [ci skip] を honor してデプロイを
          # スキップしてしまう。public/hsp/ の更新を確実に配信するため省略する。
          # build-hsp.yml は hsp/** 変更時のみ発火するので、public/hsp/ への
          # commit-back では再帰トリガーされない（パスフィルタが効く）。
          git commit -m "ci(hsp): rebuild HSP experiments"
          git push origin main
