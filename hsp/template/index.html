<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}} - Break & Shift</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      color: #e0e0e0;
    }
    h1 {
      margin-bottom: 12px;
      font-size: 1.2rem;
      color: #8888cc;
    }
    #canvas-container {
      border: 2px solid #333;
      border-radius: 4px;
      overflow: hidden;
      position: relative;
    }
    canvas { display: block; }
    #status {
      margin-top: 8px;
      font-size: 0.85rem;
      color: #888;
    }
    #progress {
      width: 200px;
      height: 6px;
      margin-top: 4px;
    }
    #output {
      width: 480px;
      max-width: 90vw;
      height: 100px;
      margin-top: 12px;
      background: #111;
      color: #0f0;
      border: 1px solid #333;
      border-radius: 4px;
      padding: 8px;
      font-family: monospace;
      font-size: 0.75rem;
      resize: vertical;
      display: none; /* hidden by default; shown if debug */
    }
    .controls {
      margin-top: 8px;
      display: flex;
      gap: 12px;
      font-size: 0.8rem;
    }
    .controls a {
      color: #6666aa;
      text-decoration: none;
    }
    .controls a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <h1>{{TITLE}}</h1>
  <div id="canvas-container">
    <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="0"></canvas>
  </div>
  <div id="status">Loading...</div>
  <progress id="progress" value="0" max="100" hidden></progress>
  <div class="controls">
    <a href="javascript:void(0)" onclick="Module.requestFullscreen(false,true)">Fullscreen</a>
    <a href="javascript:window.location.reload()">Reload</a>
    <a href="../">Back</a>
  </div>
  <textarea id="output" rows="6"></textarea>

  <!-- Data loader generated by Emscripten file_packager (must load BEFORE hsp3dish.js) -->
  <script src="{{EXPERIMENT}}.js"></script>

  <script>
    var statusElement = document.getElementById('status');
    var progressElement = document.getElementById('progress');

    var Module = {
      preRun: [function() {
        // Script logical resolution (from hsp3dish.ini or default)
        ENV.HSP_WX = "{{HSP_WX}}";
        ENV.HSP_WY = "{{HSP_WY}}";
        // Display size in browser (can differ from script resolution)
        ENV.HSP_SX = "{{HSP_SX}}";
        ENV.HSP_SY = "{{HSP_SY}}";
        // 0=no scale, 1=fit width, 2=fit height, 3=fit both
        ENV.HSP_AUTOSCALE = "{{HSP_AUTOSCALE}}";
        // 0=requestAnimationFrame, >0=fixed FPS
        ENV.HSP_FPS = "0";
        // Max HSP steps per frame before yielding to browser
        ENV.HSP_LIMIT_STEP = "15000";
      }],
      postRun: [],
      print: (function() {
        var element = document.getElementById('output');
        if (element) element.value = '';
        return function(text) {
          text = Array.prototype.slice.call(arguments).join(' ');
          console.log(text);
          if (element) {
            element.style.display = 'block';
            element.value += text + "\n";
            element.scrollTop = element.scrollHeight;
          }
        };
      })(),
      printErr: function(text) {
        text = Array.prototype.slice.call(arguments).join(' ');
        console.error(text);
      },
      canvas: document.getElementById('canvas'),
      setStatus: function(text) {
        if (!Module.setStatus.last) Module.setStatus.last = { time: Date.now(), text: '' };
        if (text === Module.setStatus.text) return;
        var m = text.match(/([^(]+)\((\d+(\.\d+)?)\/(\d+)\)/);
        var now = Date.now();
        if (m && now - Module.setStatus.last.time < 30) return;
        Module.setStatus.last.time = now;
        if (m) {
          text = m[1];
          progressElement.value = parseInt(m[2]) * 100;
          progressElement.max = parseInt(m[4]) * 100;
          progressElement.hidden = false;
        } else {
          progressElement.value = null;
          progressElement.max = null;
          progressElement.hidden = true;
          if (text === '') {
            statusElement.style.display = 'none';
          }
        }
        statusElement.innerHTML = text;
      },
      totalDependencies: 0,
      monitorRunDependencies: function(left) {
        this.totalDependencies = Math.max(this.totalDependencies, left);
        Module.setStatus(left
          ? 'Loading... (' + (this.totalDependencies - left) + '/' + this.totalDependencies + ')'
          : 'Running...');
      }
    };

    Module.setStatus('Loading...');
    window.onerror = function(event) {
      Module.setStatus('Error! See console.');
    };
  </script>
  <!-- HSP3Dish.js runtime (loads after Module is configured) -->
  <script async src="hsp3dish.js"></script>
</body>
</html>
